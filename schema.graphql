schema {
  query: Query
}

type Fruit {
  avatar: FruitAvatar
  children: [Fruit!]!
  color: String
  description: String
  id: ID!
  images: [String]
  name: String
  opening_year: Int
  parentage: [Fruit!]!
  ripening_period: String
  short_description: String
  slug: String!
  type: String!
}

type FruitAvatar {
  url: String!
}

type FruitType {
  id: ID!
  name: String
  slug: String!
}

type Fruits {
  data: [Fruit!]!
  pageInfo: Pagination!
  totalCount: Int
}

type Pagination {
  hasNextPage: Boolean!
  skip: Int!
  take: Int!
}

type Query {
  fruit(slug: String!): Fruit
  fruits(
    search: String
    skip: Int
    slugs: [String!]
    take: Int
    """API used 'apple' by default"""
    type: String
  ): Fruits
}